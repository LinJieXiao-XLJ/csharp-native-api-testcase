# IoTDB Connection Configuration
# 3C3D Cluster Configuration

# Cluster node URLs (3 ConfigNode + 3 DataNode)
nodeUrls=127.0.0.1:6667,127.0.0.1:6668,127.0.0.1:6669

# Default host (for single node fallback)
host=127.0.0.1

# Default port
port=6667

# Username
username=root

# Password
password=root

# Fetch size for query results
fetchSize=1024

# Time zone
zoneId=Asia/Shanghai

# Pool size for SessionPool
poolSize=8

# Enable RPC compression
enableRpcCompression=true

# Timeout in milliseconds
timeout=60000